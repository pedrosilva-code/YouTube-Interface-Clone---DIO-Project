<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube - Página Inicial</title>
    <link rel="stylesheet" href="pagina-inicial.css" />
  </head>
  <body>
    <header class="menu">
      <div class="left">
        <figure id="menu"><img src="./svg/menu.svg" alt="menu" /></figure>
        <figure id="logo-ytb">
          <a href="./index.html"
            ><img src="./img/youtube 1.png" alt="Youtube-logo"
          /></a>
        </figure>
      </div>

      <div class="center">
        <div class="search">
          <input type="text" class="search-bar" />
          <button class="search-btn">
            <figure><img src="./svg/search.svg" alt="search" /></figure>
          </button>
        </div>
      </div>

      <div class="right">
        <figure><img src="./svg/video.svg" alt="video" /></figure>
        <figure><img src="./svg/bell.svg" alt="bell" /></figure>
        <figure>
          <img id="profile" src="./img/profile.jpeg" alt="profile" />
        </figure>
      </div>
    </header>
    <aside class="item sidebar">
      <div class="sidebar-items">
        <figure><img src="./svg/home.svg" alt="Ínicio" /></figure>
        <p>Ínicio</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/compass.svg" alt="Explorar" /></figure>
        <p>Explorar</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/youtube.svg" alt="Inscrições" /></figure>
        <p>Inscrições</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/disc.svg" alt="YouTube Music" /></figure>
        <p>YouTube Music</p>
      </div>
      <div class="sidebar-items">
        <figure>
          <img src="./svg/thumbs-up.svg" alt="Vídeos que gostei" />
        </figure>
        <p>Vídeos que gostei</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/clock.svg" alt="Assistir mais tarde" /></figure>
        <p>Assistir mais tarde</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/download.svg" alt="Downloads" /></figure>
        <p>Downloads</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/film.svg" alt="Filmes" /></figure>
        <p>Filmes</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/book.svg" alt="Aprender" /></figure>
        <p>Aprender</p>
      </div>
      <div class="sidebar-items">
        <figure><img src="./svg/award.svg" alt="Esportes" /></figure>
        <p>Esportes</p>
      </div>
    </aside>
    <main class="item"></main>
    <footer class="item"></footer>
  </body>
</html>
