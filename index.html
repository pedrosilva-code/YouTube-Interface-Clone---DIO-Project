<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube - Assistindo Vídeo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="menu">
        <div class="left">
          <figure>
            <img src="./svg/menu (1).svg" alt="menu" />
          </figure>
          <figure>
            <img
              id="youtube"
              src="./img/youtube 1 (1).png"
              alt="youtube logo"
            />
          </figure>
        </div>
        <div class="center">
          <input type="search" placeholder="Pesquise aqui..." />
          <button>
            <figure>
              <img src="./svg/search (1).svg" alt="Procura" />
            </figure>
          </button>
        </div>
        <div class="right">
          <figure>
            <img src="./svg/video.svg" alt="Crie o seu vídeo" />
          </figure>
          <figure>
            <img src="./svg/bell.svg" alt="Notificação" />
          </figure>
          <figure>
            <img src="./img/profile (2).png" alt="Seu Perfil" width="34px" />
          </figure>
        </div>
      </div>
    </header>
    <main></main>
    <aside></aside>
  </body>
</html>
