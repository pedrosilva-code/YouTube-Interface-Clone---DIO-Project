<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Interface Clone - DIO Project</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="left">
        <figure id="menu"><img src="./svg/menu.svg" alt="menu" /></figure>
        <figure id="logo-ytb">
          <img src="./img/youtube 1.png" alt="Youtube-logo" />
        </figure>
      </div>

      <div class="center">
        <div class="search">
          <input type="text" class="search-bar" />
          <button class="search-btn">
            <figure><img src="./svg/search.svg" alt="search" /></figure>
          </button>
        </div>
      </div>

      <div class="right">
        <figure><img src="./svg/video.svg" alt="video" /></figure>
        <figure><img src="./svg/bell.svg" alt="bell" /></figure>
        <figure><img src="./img/Avatar.png" alt="Avatar" /></figure>
      </div>
    </header>
  </body>
</html>
